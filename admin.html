<!DOCTYPE html>
<html lang="ne-NP">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MK Media - Admin Control Center</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <!-- SweetAlert2 for Premium Popups -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <meta name="referrer" content="no-referrer">
    <style>
        :root {
            --admin-bg: #f5f6f7;
            --admin-card: rgba(255, 255, 255, 0.95);
        }

        [data-theme="dark"] {
            --admin-bg: #0a0a0a;
            --admin-card: #181818;
        }

        body {
            background-color: var(--admin-bg);
            transition: background-color 0.4s ease;
            font-family: 'Outfit', 'Mukta', sans-serif;
            min-height: 100vh;
        }

        .admin-nav {
            background: var(--white);
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--shadow-sm);
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid var(--border-color);
        }

        .admin-nav h2 {
            font-size: 1.4rem;
            color: var(--primary-color);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-controls {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        /* Responsiveness Fixes */
        @media (max-width: 768px) {
            .admin-nav {
                padding: 10px 15px;
            }

            .admin-nav h2 span {
                display: none;
            }

            .nav-controls button span {
                display: none;
            }

            .form-grid {
                grid-template-columns: 1fr !important;
            }
        }

        .btn-logout {
            background: #ff4d4d;
            border: none;
            color: #fff;
            padding: 10px 15px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 700;
            transition: 0.3s;
        }

        .btn-logout:hover {
            filter: brightness(0.9);
            transform: translateY(-2px);
        }

        .admin-wrapper {
            max-width: 900px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .admin-card {
            background: var(--admin-card);
            border-radius: 24px;
            padding: 30px;
            box-shadow: var(--shadow-md);
            border: 1px solid var(--border-color);
            margin-bottom: 30px;
            -webkit-backdrop-filter: blur(10px);
            backdrop-filter: blur(10px);
        }

        .form-section h3 {
            margin-bottom: 25px;
            border-left: 5px solid var(--primary-color);
            padding-left: 15px;
            color: var(--secondary-color);
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
        }

        .form-group label {
            display: block;
            margin-bottom: 10px;
            font-weight: 700;
            color: var(--secondary-color);
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 14px;
            border: 1px solid var(--border-color);
            border-radius: 14px;
            background: var(--light-bg);
            color: var(--text-color);
            font-size: 16px;
            outline: none;
            transition: 0.3s;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(211, 29, 35, 0.1);
        }

        .btn-publish {
            background: var(--primary-color);
            color: #fff;
            border: none;
            padding: 18px;
            border-radius: 14px;
            font-weight: 800;
            width: 100%;
            cursor: pointer;
            transition: 0.4s cubic-bezier(0.19, 1, 0.22, 1);
            margin-top: 15px;
            font-size: 1.1rem;
        }

        .btn-publish:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 25px rgba(211, 29, 35, 0.3);
        }

        .github-settings {
            background: rgba(33, 37, 41, 0.05);
            padding: 20px;
            border-radius: 15px;
            margin-top: 20px;
            border: 1px dashed var(--border-color);
        }

        .upload-wrapper {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-top: 10px;
        }

        .btn-secondary {
            background: var(--dark-gray);
            color: #fff;
            padding: 10px 15px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-size: 14px;
        }

        #upload-status {
            font-size: 12px;
            font-weight: 600;
        }

        .sync-status {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            margin-bottom: 15px;
            font-weight: 700;
        }

        .status-offline {
            background: #fee2e2;
            color: #991b1b;
        }

        .status-online {
            background: #dcfce7;
            color: #166534;
        }

        .admin-list-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            background: var(--white);
            margin-bottom: 15px;
            border-radius: 18px;
            border: 1px solid var(--border-color);
            transition: 0.3s;
        }

        .admin-list-item:hover {
            transform: scale(1.01);
            background: var(--light-bg);
        }

        .btn-delete {
            background: rgba(255, 77, 77, 0.1);
            color: #ff4d4d;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-delete:hover {
            background: #ff4d4d;
            color: #fff;
        }
    </style>
</head>

<body>
    <!-- SECURITY AUTO-CHECK: Redirect if no session -->
    <script>
        if (localStorage.getItem('mk_admin_session') !== 'authenticated') {
            window.location.href = 'login.html';
        }
        // Force Theme Sync
        const currentTheme = localStorage.getItem('mk_theme') || 'light';
        document.documentElement.setAttribute('data-theme', currentTheme);
    </script>

    <nav class="admin-nav">
        <h2 onclick="window.location.href='index.html'" style="cursor:pointer;">
            <i class="fas fa-tools"></i> <span>MK Media Admin Panel</span>
        </h2>
        <div class="nav-controls">
            <button onclick="window.location.href='index.html'" class="btn-logout" style="background:#666;"><i
                    class="fas fa-eye"></i> <span>View Site</span></button>
            <button id="logout-btn" class="btn-logout"><i class="fas fa-power-off"></i> <span>Logout</span></button>
        </div>
    </nav>

    <div class="admin-wrapper fade-in">
        <div class="admin-card form-section">
            <div id="conn-status" class="sync-status status-online" style="margin-bottom: 20px;">
                <i class="fas fa-cloud"></i> MK Media Cloud Live: Connected as krinsh777
            </div>

            <h3><i class="fas fa-plus-circle"></i> नयाँ समाचार थप्नुहोस् (Live Publish)</h3>
            <p style="font-size: 13px; color: grey; margin-bottom: 20px;">Your stories will be visible globally on the
                MK Media Network instantly.</p>

            <form id="admin-story-form">
                <div class="form-grid">
                    <div class="form-group">
                        <label>समाचारको शीर्षक (Title)</label>
                        <input type="text" id="news-title" placeholder="Enter headline..." required>
                    </div>
                    <div class="form-group">
                        <label>समाचारको छोटो छवि (Local Mobile Upload)</label>
                        <div class="upload-wrapper">
                            <input type="file" id="image-file" accept="image/*" style="display:none">
                            <button type="button" class="btn-secondary"
                                onclick="document.getElementById('image-file').click()">
                                <i class="fas fa-camera"></i> Pick Photo
                            </button>
                            <span id="upload-status">No photo selected</span>
                        </div>
                        <div id="image-preview-container" style="margin-top: 15px; display: none;">
                            <img id="image-preview" src=""
                                style="max-width: 100%; border-radius: 12px; border: 2px solid var(--border-color); box-shadow: var(--shadow-sm);">
                        </div>
                        <input type="hidden" id="news-image" required>
                    </div>
                </div>
                <div class="form-group" style="margin-top: 20px;">
                    <label>समाचार विवरण (Description)</label>
                    <textarea id="news-content" rows="6" placeholder="Write full story here..." required></textarea>
                </div>

                <input type="hidden" id="gh-token"
                    value="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">
                <input type="hidden" id="gh-repo" value="krinsh777/mk-media-group-">

                <button type="submit" class="btn-publish" style="background: var(--black);">
                    <i class="fas fa-cloud-upload-alt"></i> Publish Globally to GitHub Cloud
                </button>
            </form>
        </div>

        <div class="admin-card">
            <h3><i class="fas fa-tasks"></i> हालका समाचारहरु (Live Archives)</h3>
            <div id="admin-news-list" style="margin-top: 20px;">
                <!-- News loaded here -->
            </div>
        </div>
    </div>

    <script>
        const ghToken = "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";
        const ghRepo = "krinsh777/mk-media-group-";

        // Global Image Proxy to handle hotlink protection and cross-device cloud images
        function proxyImage(url) {
            if (!url) return 'https://via.placeholder.com/400x300?text=News+Article';

            // Redirect local news images to GitHub Raw with cache busting for INSTANT visibility
            if (typeof url === 'string' && url.startsWith('images/news/')) {
                return `https://raw.githubusercontent.com/${ghRepo}/main/${url}?v=${Date.now()}`;
            }
            return url;
        }

        const storyForm = document.getElementById('admin-story-form');
        const newsListGrid = document.getElementById('admin-news-list');

        // Logout logic
        document.getElementById('logout-btn').addEventListener('click', () => {
            Swal.fire({
                title: 'Logout?',
                text: "Are you sure you want to logout?",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: 'var(--primary-color)',
                confirmButtonText: 'Yes, Logout'
            }).then((result) => {
                if (result.isConfirmed) {
                    localStorage.removeItem('mk_admin_session');
                    window.location.href = 'login.html';
                }
            });
        });

        // --- IMAGE UPLOAD LOGIC ---
        const imageFileInput = document.getElementById('image-file');
        const uploadStatus = document.getElementById('upload-status');
        const hiddenImageUrl = document.getElementById('news-image');

        let selectedImageBase64 = null;
        let selectedImageName = null;

        imageFileInput.addEventListener('change', function () {
            const file = this.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function (e) {
                selectedImageBase64 = e.target.result.split(',')[1]; // Get base64 only
                selectedImageName = `img_${Date.now()}.${file.name.split('.').pop()}`;

                // Show visual feedback and preview
                uploadStatus.textContent = "Photo Ready! 📸";
                uploadStatus.style.color = "#166534";
                hiddenImageUrl.value = `images/news/${selectedImageName}`;

                // Show the image preview immediately
                const previewImg = document.getElementById('image-preview');
                const previewContainer = document.getElementById('image-preview-container');
                if (previewImg && previewContainer) {
                    previewImg.src = e.target.result;
                    previewContainer.style.display = "block";
                }
            };
            reader.readAsDataURL(file);
        });

        storyForm.addEventListener('submit', async function (e) {
            e.preventDefault();
            const title = document.getElementById('news-title').value;
            const image = document.getElementById('news-image').value;
            const content = document.getElementById('news-content').value;
            const date = new Date().toLocaleDateString('ne-NP');

            if (!image) {
                Swal.fire('Oops!', 'Please upload or provide an image first.', 'warning');
                return;
            }

            const item = { id: Date.now(), title, image, content, date };

            // 1. Show Loading
            Swal.fire({
                title: 'Publishing to Cloud...',
                html: 'Connecting to MK Media Servers 🚀',
                allowOutsideClick: false,
                didOpen: () => { Swal.showLoading(); }
            });

            try {
                // 1. Upload Image to GitHub first
                if (selectedImageBase64) {
                    const imgRes = await fetch(`https://api.github.com/repos/${ghRepo}/contents/images/news/${selectedImageName}`, {
                        method: 'PUT',
                        headers: {
                            'Authorization': `token ${ghToken}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            message: `Upload Image: ${selectedImageName}`,
                            content: selectedImageBase64
                        })
                    });
                    if (!imgRes.ok) {
                        const errData = await imgRes.json();
                        throw new Error(`GitHub Image Upload Error: ${errData.message} (${imgRes.status})`);
                    }
                }

                // 2. Fetch LATEST news list from GitHub to prevent cross-device overwrites
                const fileName = 'data/news.json';
                const getRes = await fetch(`https://api.github.com/repos/${ghRepo}/contents/${fileName}?v=${Date.now()}`, {
                    headers: { 'Authorization': `token ${ghToken}` }
                });

                let cloudList = [];
                let sha = "";

                if (getRes.ok) {
                    const fileData = await getRes.json();
                    sha = fileData.sha;
                    try {
                        // Correctly decode Base64 UTF-8 content from GitHub
                        const content = decodeURIComponent(escape(atob(fileData.content.replace(/\s/g, ''))));
                        cloudList = JSON.parse(content);
                    } catch (e) {
                        console.error("Error parsing cloud news:", e);
                        cloudList = []; // Fallback to empty if corrupt
                    }
                }

                // 3. Add new item to the FRONT of the cloud list
                cloudList.unshift(item);

                // 4. Push updated JSON to GitHub
                const putRes = await fetch(`https://api.github.com/repos/${ghRepo}/contents/${fileName}`, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `token ${ghToken}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: `Live Update: ${title}`,
                        content: btoa(unescape(encodeURIComponent(JSON.stringify(cloudList)))),
                        sha: sha
                    })
                });

                if (putRes.ok) {
                    // Update local storage for immediate feedback
                    localStorage.setItem('mk_local_news', JSON.stringify(cloudList));

                    Swal.fire({
                        title: 'Success!',
                        text: 'Your story is now LIVE globally! 🚀',
                        icon: 'success',
                        confirmButtonColor: 'var(--primary-color)'
                    });

                    storyForm.reset();
                    uploadStatus.textContent = "No photo selected";
                    hiddenImageUrl.value = "";
                    selectedImageBase64 = null;
                    selectedImageName = null;
                    document.getElementById('image-preview-container').style.display = "none";
                    loadNews();
                } else {
                    const err = await putRes.json();
                    throw new Error(err.message);
                }
            } catch (e) {
                Swal.fire('Cloud Sync Error', e.message, 'error');
            }
        });

        // --- STORY LOAD/DELETE LOGIC ---
        async function loadNews() {
            const grid = newsListGrid;

            // 1. Show cached data immediately to prevent flickering
            let currentList = JSON.parse(localStorage.getItem('mk_local_news') || '[]');
            if (currentList.length > 0) {
                renderAdminList(currentList);
            } else {
                grid.innerHTML = '<p style="text-align:center; padding: 40px; color: grey;">Connecting to cloud sync... ⌛</p>';
            }

            // 2. Refresh from GitHub
            try {
                const rawUrl = `https://raw.githubusercontent.com/${ghRepo}/main/data/news.json?v=${Date.now()}`;
                const res = await fetch(rawUrl);
                if (res.ok) {
                    const cloudList = await res.json();
                    if (JSON.stringify(cloudList) !== JSON.stringify(currentList)) {
                        localStorage.setItem('mk_local_news', JSON.stringify(cloudList));
                        renderAdminList(cloudList);
                    }
                }
            } catch (e) {
                console.error("Cloud fetch failed", e);
            }
        }

        function renderAdminList(list) {
            if (list.length === 0) {
                newsListGrid.innerHTML = '<p style="text-align:center; padding: 40px; color: grey;">अहिले कुनै समाचार छैन। (Empty feed)</p>';
                return;
            }
            const html = list.map(item => `
                <div class="admin-list-item fade-in-up">
                    <div style="flex: 1; cursor: pointer; display: flex; align-items: center; gap: 15px;" onclick="openNewsReader(${item.id})">
                        <img src="${proxyImage(item.image)}" style="width: 50px; height: 50px; border-radius: 8px; object-fit: cover;">
                        <div>
                            <strong style="display:block; font-size: 1.1rem; color: var(--secondary-color);">${item.title}</strong>
                            <small style="color: grey; font-weight: 600;"><i class="fas fa-calendar-alt"></i> ${item.date}</small>
                        </div>
                    </div>
                    <button class="btn-delete" onclick="deleteStory(${item.id})" title="Delete"><i class="fas fa-trash"></i></button>
                </div>
            `).join('');

            // Only update if content changed to prevent flicker
            if (newsListGrid.innerHTML.replace(/\s+/g, '') !== html.replace(/\s+/g, '')) {
                newsListGrid.innerHTML = html;
            }
        }

        async function deleteStory(id) {
            const { isConfirmed } = await Swal.fire({
                title: 'Delete Story?',
                text: "This story will be removed from all devices globally!",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#d33',
                confirmButtonText: 'Yes, Delete Globally'
            });

            if (isConfirmed) {
                Swal.fire({ title: 'Syncing Deletion...', didOpen: () => Swal.showLoading() });

                try {
                    // 1. Fetch LATEST news list from GitHub first
                    const fileName = 'data/news.json';
                    const getRes = await fetch(`https://api.github.com/repos/${ghRepo}/contents/${fileName}?v=${Date.now()}`, {
                        headers: { 'Authorization': `token ${ghToken}` }
                    });

                    if (!getRes.ok) throw new Error("Could not fetch latest news from cloud.");

                    const fileData = await getRes.json();
                    const sha = fileData.sha;

                    // Decode content
                    const content = decodeURIComponent(escape(atob(fileData.content.replace(/\s/g, ''))));
                    let cloudList = JSON.parse(content);

                    // 2. Filter out the deleted item from the CLOUD list
                    cloudList = cloudList.filter(it => it.id !== id);

                    // 3. Update GitHub JSON
                    const putRes = await fetch(`https://api.github.com/repos/${ghRepo}/contents/${fileName}`, {
                        method: 'PUT',
                        headers: {
                            'Authorization': `token ${ghToken}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            message: `Delete Story ID: ${id}`,
                            content: btoa(unescape(encodeURIComponent(JSON.stringify(cloudList)))),
                            sha: sha
                        })
                    });

                    if (putRes.ok) {
                        localStorage.setItem('mk_local_news', JSON.stringify(cloudList));
                        await loadNews();
                        Swal.fire('Deleted!', 'Story removed from cloud.', 'success');
                    } else {
                        const err = await putRes.json();
                        throw new Error(err.message || "Failed to update cloud list.");
                    }
                } catch (e) {
                    Swal.fire('Sync Error', e.message, 'error');
                }
            }
        }

        // --- IMMERSIVE PREVIEW READER ---
        window.openNewsReader = function (id) {
            const list = JSON.parse(localStorage.getItem('mk_local_news') || '[]');
            const item = list.find(it => it.id == id);
            if (!item) return;

            Swal.fire({
                customClass: {
                    popup: 'news-reader-popup'
                },
                showConfirmButton: true,
                confirmButtonText: 'बन्द गर्नुहोस्',
                confirmButtonColor: '#000',
                width: '900px',
                html: `
                    <div class="reader-container">
                        <div class="reader-hero">
                            <img referrerpolicy="no-referrer" src="${proxyImage(item.image)}" alt="${item.title}" onerror="this.src='images/news-placeholder.jpg'">
                            <div class="reader-meta">
                                <span class="reader-category">LATEST STORY</span>
                                <h2 class="reader-title">${item.title}</h2>
                            </div>
                        </div>
                        <div class="reader-body">
                            <div class="reader-actions" style="margin-bottom: 20px; display: flex; gap: 10px;">
                                <button onclick="shareOnFacebook('${item.title}', '${item.image}')" class="btn-share-fb" style="background:#1877f2; color:white; border:none; padding:8px 15px; border-radius:8px; cursor:pointer; display:flex; align-items:center; gap:8px;">
                                    <i class="fab fa-facebook"></i> Facebook मा सेयर गर्नुहोस्
                                </button>
                                <button onclick="shareButtonGroup('${item.title}', '${item.content.substring(0, 100)}...')" class="btn-share-generic" style="background:#333; color:white; border:none; padding:8px 15px; border-radius:8px; cursor:pointer; display:flex; align-items:center; gap:8px;">
                                    <i class="fas fa-share-alt"></i> अरु ठाउँमा सेयर
                                </button>
                            </div>
                            <span class="reader-date"><i class="far fa-clock"></i> ${item.date}</span>
                            <div class="reader-content">${item.content.replace(/\n/g, '<br>')}</div>
                        </div>
                    </div>
                `
            });
        }

        loadNews();
    </script>
</body>

</html>
