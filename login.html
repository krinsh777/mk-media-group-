<!DOCTYPE html>
<html lang="ne-NP">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MK Media - Admin Login</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #0f0f0f 0%, #1a1a1a 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            font-family: 'Outfit', sans-serif;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            width: 90%;
            max-width: 400px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
        }

        .login-logo {
            max-width: 150px;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 10px rgba(211, 29, 35, 0.3));
        }

        .login-card h2 {
            color: #fff;
            margin-bottom: 30px;
            font-size: 1.8rem;
            font-weight: 700;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            color: #ccc;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .input-group input {
            width: 100%;
            padding: 14px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: #fff;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
        }

        .input-group input:focus {
            border-color: var(--primary-color);
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 15px rgba(211, 29, 35, 0.2);
        }

        .btn-login {
            width: 100%;
            padding: 16px;
            background: var(--primary-color);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            margin-top: 10px;
        }

        .btn-login:hover {
            transform: scale(1.02);
            filter: brightness(1.1);
            box-shadow: 0 10px 20px rgba(211, 29, 35, 0.4);
        }

        .error-msg {
            color: #ff4d4d;
            font-size: 14px;
            margin-top: 15px;
            display: none;
            animation: shake 0.4s ease-in-out;
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            25% {
                transform: translateX(-5px);
            }

            75% {
                transform: translateX(5px);
            }
        }
    </style>
</head>

<body>
    <div class="login-card fade-in">
        <img src="images/logo.png" alt="MK Media" class="login-logo"
            onerror="this.src='https://via.placeholder.com/150x50?text=MK+MEDIA'">
        <h2>Admin Authentication</h2>
        <form id="login-form">
            <div class="input-group">
                <label>पहुँच कोड (Access Code)</label>
                <input type="password" id="admin-password" placeholder="Enter password..." required autofocus>
            </div>
            <button type="submit" class="btn-login">Unlock Portal</button>
            <div id="login-error" class="error-msg">पासवर्ड मिलेन! (Incorrect Password)</div>
        </form>
    </div>

    <script>
        // Set a default password (Owner can change this)
        const SECRET_KEY = "mkmedia123";

        document.getElementById('login-form').addEventListener('submit', function (e) {
            e.preventDefault();
            const pass = document.getElementById('admin-password').value;
            const error = document.getElementById('login-error');

            if (pass === SECRET_KEY) {
                // Save session in localStorage with a timestamp
                localStorage.setItem('mk_admin_session', 'authenticated');
                localStorage.setItem('mk_admin_time', Date.now());
                // Redirect to admin
                window.location.href = 'admin.html';
            } else {
                error.style.display = 'block';
                document.getElementById('admin-password').value = '';
                setTimeout(() => { error.style.display = 'none'; }, 2000);
            }
        });

        // If already logged in, redirect
        if (localStorage.getItem('mk_admin_session') === 'authenticated') {
            window.location.href = 'admin.html';
        }
    </script>
</body>

</html>
